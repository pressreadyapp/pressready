<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Stripe subscription payment link ─────────────────────────────────────
    // Replace this with the actual $9.99/month Payment Link you created in Stripe
    const STRIPE_PRO_LINK = "https://buy.stripe.com/aFa7sM9AKcKr9KW3zP6Ri01";

    // ── Storage keys ─────────────────────────────────────────────────────────
    const PRO_TOKEN_KEY = "pressready_pro_token_v1";
    const PRO_EMAIL_KEY = "pressready_pro_email_v1";
    // Legacy key — keeps working for anyone who paid the old $19
    const LEGACY_UNLOCK_KEY = "pressready_unlocked_v1";

    // ── Sections visible without Pro ─────────────────────────────────────────
    const FREE_SECTION_KEYS = new Set([
      "executive_summary",
      "pre_launch",
      "launch_week",
      "pricing_strategy"
    ]);

    const STEPS = [
      { id: "genre",      label: "Genre" },
      { id: "details",    label: "Book" },
      { id: "experience", label: "Experience" },
      { id: "platform",   label: "Platform" },
      { id: "budget",     label: "Budget" },
      { id: "timeline",   label: "Timeline" },
    ];

    const GENRES = [
      "Urban Fiction", "Literary Fiction", "Psychological Thriller",
      "Science Fiction", "Romance", "Mystery", "Fantasy",
      "Non-Fiction", "Self-Help", "Biography", "Horror", "Historical Fiction"
    ];

    const SERIES_POSITIONS = [
      "Standalone", "Book 1 of series", "Mid-series (book 2-4)",
      "Series finale", "Spin-off / companion"
    ];

    const EXPERIENCE    = ["First book", "2-5 books published", "6+ books published"];
    const LIST_SIZES    = ["No list yet", "Under 100", "100-1,000", "1,000+"];
    const CATALOG_SIZES = ["Only this book", "2-5 other titles", "6+ other titles in this pen name"];
    const PLATFORMS     = ["Amazon KDP / Kindle Unlimited", "IngramSpark / Wide", "Both KDP + Wide", "Draft2Digital"];
    const BUDGETS       = ["$0 – Bootstrap only", "$1–$100", "$101–$500", "$501–$1,000", "$1,000+"];
    const TIMELINES     = ["2 weeks", "1 month", "2 months", "3 months", "6 months"];

    const LOADING_MESSAGES = [
      "ANALYZING YOUR GENRE...",
      "BRANCHING ON YOUR EXPERIENCE LEVEL...",
      "TAILORING TO YOUR CATALOG...",
      "MAPPING YOUR PLATFORM STRATEGY...",
      "FINALIZING YOUR LAUNCH PLAN..."
    ];

    // ── Prompt builder ────────────────────────────────────────────────────────
    function buildPrompt(form) {
      return `You are PressReady, a launch strategist built by an indie press with 35 books across 7 pen names. You speak operator-to-operator. You do not pad. You do not hype.

AUTHOR INPUTS:
- Genre: ${form.genre}
- Book title: ${form.title}
- Series position: ${form.series_position}
- Author experience: ${form.experience}
- Existing email list: ${form.list_size}
- Other titles in this pen name: ${form.catalog_size}
- Platform: ${form.platform}
- Budget: ${form.budget}
- Timeline: ${form.timeline}

BRANCHING RULES — APPLY BEFORE WRITING ANYTHING:

1. EXPERIENCE LEVEL
- "First book": include foundational tactics (set up Goodreads, build initial list, find beta readers).
- "2-5 books": skip basic setup. Assume Goodreads, KDP, and a small list exist. Focus on improving conversion and reaching the next tier.
- "6+ books": this author has infrastructure and a proven catalog. DO NOT recommend list-building from zero, basic Goodreads setup, or first-time KDP tactics. Focus on catalog leverage, read-through, and scaling what already works.

2. LIST SIZE
- "No list yet" or "Under 100": prioritize list-building from real touchpoints (book back matter, social bio, lead magnets).
- "100-1,000": focus on segmentation, engagement, and conversion — not pure growth.
- "1,000+": list is an asset. Focus on launch-day mobilization, segmentation by reader behavior, and read-through emails.

3. SERIES POSITION
- "Standalone": standard launch playbook.
- "Book 1 of series": prioritize hook, sample, and series-setup.
- "Mid-series" or "Series finale": READ-THROUGH IS THE PRIMARY STRATEGY. Recommend free or $0.99 promo on Book 1. DO NOT recommend pricing the new release at $0.99.
- "Spin-off / companion": leverage existing series fanbase via back matter, email, and series page placement.

4. CATALOG SIZE
- "Only this book": no cross-promotion possible yet.
- "2-5 other titles": back matter cross-promo is a tactic, not the strategy.
- "6+ other titles in this pen name": back matter cross-promotion, series page optimization, and catalog-wide free promo rotation are PRIMARY tactics.

5. GENRE TAILORING
- Urban Fiction: BookTok, Black bookstagram, KU read-through, urban fiction Facebook groups, street team grassroots.
- Literary Fiction: NetGalley, Kirkus/Publishers Weekly, indie bookstore outreach, BCALA and similar awards, longer review cycles.
- Psychological Thriller: BookTok, ARC services like BookSirens, thriller-specific newsletters, Goodreads thriller groups.
- Science Fiction / Fantasy: r/printSF, r/Fantasy, Goodreads groups, series cross-promo, novella prequels.
- Romance: BookTok dominant, KU read-through critical, tropes loaded into metadata and blurb.
- Mystery: cozy/hardboiled subgenre matters; Goodreads mystery groups, NetGalley, podcast tour.
- Non-Fiction / Self-Help / Biography: LinkedIn, podcast tour, expert positioning, evergreen tail.
- Historical Fiction: NetGalley, historical fiction Facebook groups, reading-group/book-club outreach.
- Horror: r/horrorlit, BookTok horror, indie horror podcasts, Halloween-season timing if relevant.

6. BUDGET DISCIPLINE
- "$0 – Bootstrap only": zero paid recommendations.
- "$1–$100": small Amazon Ads test only after organic validation.
- "$101–$500": modest Amazon Ads, one paid newsletter feature.
- "$501–$1,000": stacked promo days, BookBub Featured Deal candidate.
- "$1,000+": full launch stack — BookBub, paid PR, expanded ads, ARC service.

PROHIBITED:
- Do not invent reach numbers or numerical benchmarks.
- Do not predict specific revenue figures, unit sales counts, or review counts.
- Do not recommend tactics the author has outgrown.
- Do not exceed the stated budget.

OUTPUT FORMAT — return ONLY this JSON, no preamble, no markdown fences:
{
  "executive_summary": "2-3 sentences max, specific to inputs",
  "pre_launch": "6-10 bullets, tailored to experience level",
  "launch_week": "7 days, 2-3 bullets each day, formatted as 'Day 1: ...\\nDay 2: ...'",
  "pricing_strategy": "5 bullets max, must respect series position rules above",
  "review_strategy": "6 bullets max",
  "social_media": "6 bullets max, genre-appropriate platforms only",
  "algorithm_tips": "6 bullets max",
  "email_list": "6 bullets max, tailored to list size above",
  "post_launch": "3 phases, 3 bullets each",
  "budget_breakdown": "5 bullets max, must respect stated budget",
  "kpis": "5 bullets max. Each KPI is a metric to track, not a number to forecast.",
  "pro_tip": "2-3 sentences. Must be specific to this author's inputs. Not generic."
}

Every value is a plain string. Use \\n for line breaks and • for bullets. Do NOT use nested objects or arrays.`;
    }

    // ── Utilities ─────────────────────────────────────────────────────────────
    function track(eventName, params = {}) {
      if (typeof gtag !== 'undefined') gtag('event', eventName, params);
    }

    function extractJSON(raw) {
      if (!raw) return null;
      const stripped = raw.replace(/```json|```/g, "").trim();
      const start = stripped.indexOf("{");
      const end = stripped.lastIndexOf("}");
      if (start === -1 || end === -1 || end <= start) return null;
      try { return JSON.parse(stripped.slice(start, end + 1)); } catch { return null; }
    }

    const REQUIRED_PLAN_KEYS = [
      "executive_summary","pre_launch","launch_week","pricing_strategy",
      "review_strategy","social_media","algorithm_tips","email_list",
      "post_launch","budget_breakdown","kpis","pro_tip"
    ];

    function validatePlan(plan) {
      if (!plan || typeof plan !== 'object') return { valid: false, missing: REQUIRED_PLAN_KEYS };
      const missing = REQUIRED_PLAN_KEYS.filter(k => !plan[k]);
      return { valid: missing.length === 0, missing };
    }

    // ── Pro access state ──────────────────────────────────────────────────────
    // Pro access comes from:
    //   1. A valid pro_token in localStorage (issued by /api/verify-subscription)
    //   2. Legacy: the old $19 unlock flag (honored forever)
    function readProState() {
      try {
        const token = localStorage.getItem(PRO_TOKEN_KEY);
        const email = localStorage.getItem(PRO_EMAIL_KEY);
        const legacy = localStorage.getItem(LEGACY_UNLOCK_KEY) === 'true';
        return { token, email, legacy, isPro: !!(token || legacy) };
      } catch {
        return { token: null, email: null, legacy: false, isPro: false };
      }
    }

    function writeProToken(token, email) {
      try {
        localStorage.setItem(PRO_TOKEN_KEY, token);
        if (email) localStorage.setItem(PRO_EMAIL_KEY, email);
      } catch {}
    }

    function clearProToken() {
      try {
        localStorage.removeItem(PRO_TOKEN_KEY);
        localStorage.removeItem(PRO_EMAIL_KEY);
      } catch {}
    }

    // ── Email verification modal ──────────────────────────────────────────────
    function VerifyModal({ onSuccess, onClose }) {
      const [email, setEmail] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const handleVerify = async () => {
        if (!email.trim() || !email.includes('@')) {
          setError("Please enter a valid email address.");
          return;
        }
        setLoading(true);
        setError(null);
        try {
          const res = await fetch('/api/verify-subscription', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email.trim().toLowerCase() })
          });
          const data = await res.json();
          if (data.active && data.token) {
            writeProToken(data.token, data.email);
            track('pro_verified', { email: data.email });
            onSuccess(data.token, data.email);
          } else {
            const reasons = {
              no_subscription: "No active Pro subscription found for that email. If you just subscribed, wait a moment and try again.",
              subscription_inactive: "Your subscription appears to be inactive or cancelled.",
              stripe_error: "We couldn't verify your subscription right now. Please try again."
            };
            setError(reasons[data.reason] || "Verification failed. Please try again or contact blackfuegopublishing@proton.me.");
          }
        } catch (err) {
          setError("Connection error. Please check your internet and try again.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: "16px" }}>
          <div style={{ background: "#141416", border: "1.5px solid rgba(232,197,71,0.3)", borderRadius: 16, padding: "36px 32px", maxWidth: 440, width: "100%", animation: "modalIn 0.25s ease" }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 16 }}>PRESSREADY PRO</div>
            <h3 style={{ fontFamily: "'Lora', serif", fontSize: 22, color: "#fff", fontWeight: 600, marginBottom: 10, lineHeight: 1.3 }}>Already a subscriber?</h3>
            <p style={{ fontFamily: "'Lora', serif", fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.7, marginBottom: 24 }}>Enter the email you used when you subscribed to restore full access on this device.</p>
            <input
              type="email"
              placeholder="your@email.com"
              value={email}
              onChange={e => setEmail(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleVerify()}
              style={{ width: "100%", padding: "13px 16px", background: "rgba(255,255,255,0.06)", border: "1.5px solid rgba(255,255,255,0.15)", borderRadius: 8, color: "#fff", fontFamily: "'Lora', Georgia, serif", fontSize: 15, marginBottom: 12 }}
            />
            {error && (
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "#ff8a8a", lineHeight: 1.6, marginBottom: 12 }}>{error}</div>
            )}
            <button
              onClick={handleVerify}
              disabled={loading}
              style={{ width: "100%", padding: "14px", borderRadius: 8, background: loading ? "rgba(232,197,71,0.5)" : "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.12em", cursor: loading ? "not-allowed" : "pointer", textTransform: "uppercase", marginBottom: 12 }}
            >
              {loading ? "VERIFYING..." : "RESTORE ACCESS →"}
            </button>
            <button
              onClick={onClose}
              style={{ width: "100%", padding: "10px", borderRadius: 8, background: "transparent", border: "1px solid rgba(255,255,255,0.12)", color: "rgba(255,255,255,0.4)", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer", letterSpacing: "0.08em" }}
            >
              CANCEL
            </button>
          </div>
        </div>
      );
    }

    // ── Paywall card ──────────────────────────────────────────────────────────
    function PaywallCard({ title, isPrimary = false, delay = 0, onRestoreAccess }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, []);

      const handleSubscribe = () => {
        track('pro_subscribe_clicked', { from_section: title });
        window.open(STRIPE_PRO_LINK, '_blank');
      };

      if (!isPrimary) {
        return (
          <div style={{ opacity: visible ? 1 : 0, transition: "opacity 0.5s ease", marginBottom: 16, borderLeft: "3px solid rgba(232,197,71,0.25)", paddingLeft: 18, paddingTop: 4, paddingBottom: 4 }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(232,197,71,0.5)", letterSpacing: "0.15em", textTransform: "uppercase", display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontSize: 13 }}>🔒</span>{title}
              <span style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", letterSpacing: "0.1em" }}>— PRO ONLY</span>
            </div>
          </div>
        );
      }

      return (
        <div style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(16px)", transition: "all 0.5s ease", marginBottom: 28, marginTop: 16, padding: "32px 28px", background: "linear-gradient(135deg, rgba(232,197,71,0.08), rgba(232,197,71,0.02))", border: "1.5px solid rgba(232,197,71,0.4)", borderRadius: 14 }}>
          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 14 }}>
            🔒 8 SECTIONS · PRO ONLY
          </div>
          <h3 style={{ fontFamily: "'Lora', serif", fontSize: 26, color: "#fff", fontWeight: 600, marginBottom: 12, lineHeight: 1.25 }}>Unlock your full launch plan.</h3>
          <p style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.75)", lineHeight: 1.7, marginBottom: 22 }}>
            You've seen the strategy overview, pre-launch checklist, launch week tactics, and pricing strategy. The remaining 8 sections — review &amp; ARC strategy, social media plan, algorithm triggers, email list building, post-launch plan, budget breakdown, success metrics, and the Elite Insider Tip — are part of PressReady Pro.
          </p>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 8, marginBottom: 26 }}>
            {["Review & ARC Strategy","Social Media Plan","Algorithm Triggers","Email List Building","Post-Launch Plan","Budget Breakdown","Success Metrics","Elite Insider Tip"].map(s => (
              <div key={s} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(232,197,71,0.15)", borderRadius: 6, padding: "10px 12px", fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.6)", letterSpacing: "0.05em" }}>
                🔒 {s}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap", marginBottom: 16 }}>
            <button onClick={handleSubscribe} style={{ padding: "16px 36px", borderRadius: 10, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.14em", cursor: "pointer", textTransform: "uppercase" }}>
              Subscribe — $9.99/mo
            </button>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: "0.08em", lineHeight: 1.5 }}>
              Unlimited plans · Full 12 sections<br/>Cancel anytime
            </div>
          </div>
          <button onClick={onRestoreAccess} style={{ background: "transparent", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(232,197,71,0.6)", letterSpacing: "0.1em", cursor: "pointer", textDecoration: "underline", padding: 0 }}>
            Already a subscriber? Restore access →
          </button>
        </div>
      );
    }

    // ── Presentational components ─────────────────────────────────────────────
    function Landing({ onStart, onDashboard, proState }) {
      return (
        <div style={{ minHeight: "100vh", background: "#0D0D0F", backgroundImage: "radial-gradient(ellipse at 30% 0%, rgba(232,197,71,0.08) 0%, transparent 55%), radial-gradient(ellipse at 80% 90%, rgba(232,197,71,0.04) 0%, transparent 50%)", color: "#fff", fontFamily: "'Lora', Georgia, serif", padding: "0 16px 80px" }}>
          <div style={{ maxWidth: 920, margin: "0 auto" }}>
            <div style={{ paddingTop: 40, animation: "fadeUp 0.5s ease both" }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.3em", textTransform: "uppercase", opacity: 0.8 }}>PressReady · Launch Intelligence</div>
            </div>
            <div style={{ paddingTop: 80, paddingBottom: 48, animation: "fadeUp 0.6s ease 0.1s both" }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(232,197,71,0.8)", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 24 }}>For indie authors who actually publish</div>
              <h1 style={{ fontSize: "clamp(40px, 7vw, 72px)", fontWeight: 600, color: "#FFFFFF", lineHeight: 1.05, fontFamily: "'Lora', Georgia, serif", letterSpacing: "-0.02em" }}>
                A real launch plan<br/>for your book.<br/>
                <span style={{ fontStyle: "italic", color: "#E8C547" }}>In 60 seconds.</span>
              </h1>
              <p style={{ color: "rgba(255,255,255,0.6)", fontSize: 18, marginTop: 28, fontFamily: "'Lora', Georgia, serif", lineHeight: 1.6, maxWidth: 620 }}>
                PressReady generates a full launch strategy tailored to your genre, experience level, catalog, budget, and timeline. Built by an indie press with 35 books across 7 pen names — not a marketing agency, not a content farm.
              </p>
              <div style={{ marginTop: 44, display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
                <button onClick={onStart} style={{ padding: "18px 40px", borderRadius: 10, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 13, fontWeight: 700, letterSpacing: "0.14em", cursor: "pointer", textTransform: "uppercase", animation: "glow 3s ease-in-out infinite" }}>
                  Generate Your Plan →
                </button>
                <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.4)", letterSpacing: "0.08em" }}>Free preview · No signup · 60 seconds</span>
                {proState && proState.isPro && (
                  <button onClick={onDashboard} style={{ padding: "18px 28px", borderRadius: 10, background: "transparent", color: "#E8C547", border: "1.5px solid rgba(232,197,71,0.4)", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.12em", cursor: "pointer", textTransform: "uppercase" }}>
                    MY DASHBOARD →
                  </button>
                )}
              </div>
            </div>
            <div style={{ height: 1, background: "linear-gradient(90deg, transparent, rgba(232,197,71,0.3), transparent)", margin: "40px 0 60px", animation: "fadeIn 1s ease 0.6s both" }} />
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 32, marginBottom: 80, animation: "fadeUp 0.7s ease 0.3s both" }}>
              <div>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 12 }}>01 — TAILORED</div>
                <h3 style={{ fontFamily: "'Lora', serif", fontSize: 18, color: "#fff", marginBottom: 10, fontWeight: 600 }}>Genre + experience aware</h3>
                <p style={{ fontFamily: "'Lora', serif", fontSize: 14, color: "rgba(255,255,255,0.55)", lineHeight: 1.7 }}>A debut and a 6-book backlist need different plans. PressReady asks the right questions and branches accordingly.</p>
              </div>
              <div>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 12 }}>02 — EXECUTABLE</div>
                <h3 style={{ fontFamily: "'Lora', serif", fontSize: 18, color: "#fff", marginBottom: 10, fontWeight: 600 }}>Day-by-day actions</h3>

              </div>

                <h3 style={{ fontFamily: "'Lora', serif", fontSize: 18, color: "#fff", marginBottom: 10, fontWeight: 600 }}>Built by a publisher</h3>
                <p style={{ fontFamily: "'Lora', serif", fontSize: 14, color: "rgba(255,255,255,0.55)", lineHeight: 1.7 }}>Most launch tools are built by people who've never published a book. PressReady was built by a press that has — 35 times.</p>

            <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 14, padding: "36px 32px", marginBottom: 60, animation: "fadeUp 0.7s ease 0.4s both" }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 20 }}>WHO BUILT THIS</div>
              <h3 style={{ fontFamily: "'Lora', serif", fontSize: 24, color: "#fff", marginBottom: 16, fontWeight: 600 }}>Black Fuego Press is an independent imprint with 35 books across 7 pen names.</h3>
              <p style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.7)", lineHeight: 1.8, marginBottom: 14 }}>The press operates across urban fiction, literary fiction, psychological thrillers, sci-fi, non-fiction, and historical fiction. The strategies that work — and the ones that don't — were learned the long way: title by title, launch by launch.</p>
              <p style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.7)", lineHeight: 1.8 }}>Most launch advice online is recycled, written by people who've never sold a book they wrote themselves. PressReady was built so authors don't have to figure it out the hard way over six years and 35 books.</p>
              <div style={{ marginTop: 24, fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(232,197,71,0.7)", letterSpacing: "0.1em" }}>— Black Fuego Press</div>
            </div>
            <div style={{ marginBottom: 60, animation: "fadeUp 0.7s ease 0.5s both" }}>

              <h3 style={{ fontFamily: "'Lora', serif", fontSize: 22, color: "#fff", marginBottom: 28, fontWeight: 600, textAlign: "center" }}>A complete strategy across 12 sections.</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
                {[["Strategy Overview","free"],["Pre-Launch Checklist","free"],["Launch Week Tactics","free"],["Pricing Strategy","free"],["Review & ARC Strategy","pro"],["Social Media Plan","pro"],["Algorithm Triggers","pro"],["Email List Building","pro"],["Post-Launch Plan","pro"],["Budget Breakdown","pro"],["Success Metrics","pro"],["Elite Insider Tip","pro"]].map(([s, tier], i) => (
                  <div key={s} style={{ background: "rgba(255,255,255,0.03)", border: `1px solid ${tier === 'pro' ? 'rgba(232,197,71,0.25)' : 'rgba(232,197,71,0.1)'}`, borderRadius: 6, padding: "12px 14px", fontFamily: "'Space Mono', monospace", fontSize: 11, color: tier === 'pro' ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.5)", letterSpacing: "0.05em" }}>

              </div>

            <div style={{ textAlign: "center", padding: "60px 24px", background: "rgba(232,197,71,0.04)", border: "1px solid rgba(232,197,71,0.15)", borderRadius: 14, animation: "fadeUp 0.7s ease 0.6s both" }}>
              <h3 style={{ fontFamily: "'Lora', serif", fontSize: 28, color: "#fff", fontWeight: 600, marginBottom: 14, lineHeight: 1.3 }}>Got a book? <span style={{ fontStyle: "italic", color: "#E8C547" }}>Get a plan.</span></h3>
              <p style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.55)", marginBottom: 28 }}>Six quick questions. One real strategy. No email required.</p>
              <button onClick={onStart} style={{ padding: "16px 36px", borderRadius: 10, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.14em", cursor: "pointer", textTransform: "uppercase" }}>Generate Your Plan →</button>
            </div>
            <div style={{ marginTop: 60, paddingTop: 32, borderTop: "1px solid rgba(255,255,255,0.06)", textAlign: "center", fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: "0.15em", animation: "fadeIn 1s ease 0.8s both" }}>
              POWERED BY PRESSREADY · LAUNCH INTELLIGENCE<br/>
              <span style={{ marginTop: 8, display: "inline-block", opacity: 0.7 }}>A Black Fuego Press Project</span><br/>

    function ProgressBar({ step }) {
      return (
        <div style={{ display: "flex", gap: 6, marginBottom: 36 }}>
          {STEPS.map((s, i) => (
            <div key={s.id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <div style={{ width: "100%", height: 4, borderRadius: 2, background: i <= step ? "#E8C547" : "rgba(255,255,255,0.12)", transition: "background 0.4s" }} />
              <span style={{ fontSize: 9, fontFamily: "'Space Mono', monospace", color: i <= step ? "#E8C547" : "rgba(255,255,255,0.3)", letterSpacing: "0.06em", textTransform: "uppercase", transition: "color 0.4s" }}>{s.label}</span>
            </div>
          ))}
        </div>
      );
    }

    function SelectGrid({ options, value, onChange, minWidth = 140 }) {
      return (
        <div style={{ display: "grid", gridTemplateColumns: `repeat(auto-fill, minmax(${minWidth}px, 1fr))`, gap: 10 }}>
          {options.map(opt => (
            <button key={opt} onClick={() => onChange(opt)} style={{ padding: "12px 14px", borderRadius: 8, border: "1.5px solid", borderColor: value === opt ? "#E8C547" : "rgba(255,255,255,0.15)", background: value === opt ? "rgba(232,197,71,0.12)" : "rgba(255,255,255,0.04)", color: value === opt ? "#E8C547" : "rgba(255,255,255,0.75)", fontFamily: "'Space Mono', monospace", fontSize: 12, cursor: "pointer", textAlign: "left", lineHeight: 1.4, transition: "all 0.2s" }}>
              {value === opt && <span style={{ marginRight: 6 }}>✦</span>}{opt}
            </button>
          ))}
        </div>
      );
    }

    function TypewriterText({ text, speed = 60 }) {
      const [displayed, setDisplayed] = useState("");
      const [done, setDone] = useState(false);
      const idx = useRef(0);
      useEffect(() => {
        setDisplayed(""); setDone(false); idx.current = 0;
        const interval = setInterval(() => {
          if (idx.current < text.length) { setDisplayed(text.slice(0, idx.current + 1)); idx.current++; }
          else { setDone(true); clearInterval(interval); }
        }, speed);
        return () => clearInterval(interval);
      }, [text]);
      return <span>{displayed}{!done && <span style={{ opacity: 0.6, animation: "blink 1s infinite" }}>▋</span>}</span>;
    }

    function RotatingMessage() {
      const [index, setIndex] = useState(0);
      useEffect(() => {
        const interval = setInterval(() => setIndex(i => (i + 1) % LOADING_MESSAGES.length), 4000);
        return () => clearInterval(interval);
      }, []);
      return <TypewriterText key={index} text={LOADING_MESSAGES[index]} />;
    }

    function PlanSection({ title, content, delay = 0 }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => { const t = setTimeout(() => setVisible(true), delay); return () => clearTimeout(t); }, []);
      const text = typeof content === 'string' ? content : typeof content === 'object' ? Object.values(content).join('\n') : String(content);
      return (
        <div style={{ opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(16px)", transition: "all 0.5s ease", marginBottom: 28, borderLeft: "3px solid #E8C547", paddingLeft: 18 }}>
          <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "#E8C547", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 10 }}>{title}</div>
          <div style={{ fontFamily: "'Lora', Georgia, serif", fontSize: 15, color: "rgba(255,255,255,0.88)", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{text}</div>
        </div>
      );
    }

    function Label({ children }) {
      return <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.5)", letterSpacing: "0.15em", textTransform: "uppercase", marginBottom: 16 }}>{children}</div>;
    }

    function Input({ placeholder, value, onChange, style = {} }) {
      const [focused, setFocused] = useState(false);
      return (
        <input placeholder={placeholder} value={value} onChange={onChange}
          onFocus={() => setFocused(true)} onBlur={() => setFocused(false)}
          style={{ width: "100%", padding: "14px 16px", background: "rgba(255,255,255,0.05)", border: "1.5px solid", borderColor: focused ? "rgba(232,197,71,0.5)" : "rgba(255,255,255,0.12)", borderRadius: 8, color: "#fff", fontFamily: "'Lora', Georgia, serif", fontSize: 15, transition: "border-color 0.2s", ...style }} />
      );
    }

    function CopyButton({ planText, onCopy }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        const finish = () => { setCopied(true); if (onCopy) onCopy(); setTimeout(() => setCopied(false), 2000); };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(planText).then(finish).catch(() => {
            const el = document.createElement('textarea');
            el.value = planText; document.body.appendChild(el); el.select();
            try { document.execCommand('copy'); } catch {}
            document.body.removeChild(el); finish();
          });
        }
      };
      return (
        <button onClick={handleCopy} style={{ padding: "12px 20px", borderRadius: 6, border: "1.5px solid rgba(232,197,71,0.4)", background: copied ? "rgba(232,197,71,0.15)" : "transparent", color: "#E8C547", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer", transition: "all 0.2s", minWidth: 110 }}>
          {copied ? "COPIED ✓" : "COPY PLAN"}
        </button>
      );
    }

    function ShareButton() {
      const [shared, setShared] = useState(false);
      const handleShare = () => {
        const flagShared = () => { setShared(true); setTimeout(() => setShared(false), 2000); };
        if (navigator.share) {
          navigator.share({ title: "PressReady · Launch Intelligence", text: "Just got my book launch plan from PressReady — built by an indie press with 35 books. pressready.ink", url: "https://pressready.ink" }).catch(() => {});
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText("Just got my book launch plan from PressReady — built by an indie press. pressready.ink").then(flagShared).catch(flagShared);
        } else { flagShared(); }
      };
      return (
        <button onClick={handleShare} style={{ padding: "12px 20px", borderRadius: 6, border: "1.5px solid rgba(255,255,255,0.15)", background: shared ? "rgba(255,255,255,0.08)" : "transparent", color: "rgba(255,255,255,0.6)", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer", transition: "all 0.2s", minWidth: 100 }}>
          {shared ? "LINK COPIED ✓" : "SHARE ↗"}
        </button>
      );
    }

    // ── Wizard ────────────────────────────────────────────────────────────────
    const INITIAL_FORM = { genre: "", title: "", series_position: "", experience: "", list_size: "", catalog_size: "", platform: "", budget: "", timeline: "" };

    function Wizard({ onBackToLanding, onDashboard, proState, onProVerified }) {
      const [step, setStep] = useState(0);
      const [form, setForm] = useState(INITIAL_FORM);
      const [loading, setLoading] = useState(false);
      const [plan, setPlan] = useState(null);
      const [parsedPlan, setParsedPlan] = useState(null);
      const [error, setError] = useState(null);
      const [showVerifyModal, setShowVerifyModal] = useState(false);
      const [showLaunchDateModal, setShowLaunchDateModal] = useState(false);
      const [planSaved, setPlanSaved] = useState(false);

      const isPro = proState.isPro;

      const savePlan = async (launchDate) => {
        if (!proState.token || !parsedPlan) return;
        try {
          await fetch('/api/save-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pro_token: proState.token, plan_data: parsedPlan, form, launch_date: launchDate || null })
          });
          setPlanSaved(true);
        } catch {}
        setShowLaunchDateModal(false);
      };

      const update = (key, val) => setForm(f => ({ ...f, [key]: val }));

      const canNext = () => {
        switch (step) {
          case 0: return !!form.genre;
          case 1: return !!form.title.trim() && !!form.series_position;
          case 2: return !!form.experience && !!form.list_size && !!form.catalog_size;
          case 3: return !!form.platform;
          case 4: return !!form.budget;
          case 5: return !!form.timeline;
          default: return true;
        }
      };

      const generatePlan = async (retryCount = 0) => {
        setLoading(true); setError(null); setPlan(null); setParsedPlan(null);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 55000);
        const prompt = buildPrompt(form);

        try {
          const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt,
              pro_token: proState.token || undefined
            }),
            signal: controller.signal
          });
          const data = await response.json();

          if (data.error) {
            const msg = typeof data.error === 'string' ? data.error : (data.error.message || JSON.stringify(data.error));
            setError(msg); return;
          }

          const raw = (data.content || []).map(b => b.text || "").join("");
          if (!raw) { setError("No response received. Please try again."); return; }

          const parsed = extractJSON(raw);
          if (parsed) {
            const { valid, missing } = validatePlan(parsed);
            setParsedPlan(parsed);
            track('plan_generated', { genre: form.genre, experience: form.experience, isPro, valid, missing_count: missing.length });
            if (isPro) setShowLaunchDateModal(true);
          } else {
            setPlan(raw);
            track('plan_generated_unparsed', { genre: form.genre });
          }
        } catch (err) {
          if (retryCount < 1) { clearTimeout(timeoutId); setLoading(false); return generatePlan(retryCount + 1); }
          if (err.name === 'AbortError') {
            setError("Request timed out. Our servers are busy — please try again in a moment.");
            track('generation_error', { reason: 'timeout' });
          } else {
            setError("Connection error: " + err.message);
            track('generation_error', { reason: err.message });
          }
        } finally {
          clearTimeout(timeoutId); setLoading(false);
        }
      };

      const handleNext = () => {
        if (step < STEPS.length - 1) setStep(s => s + 1);
        else generatePlan();
      };

      const reset = () => { setStep(0); setForm(INITIAL_FORM); setPlan(null); setParsedPlan(null); setError(null); };

      const planText = parsedPlan
        ? Object.entries(parsedPlan).filter(([k]) => isPro || FREE_SECTION_KEYS.has(k)).map(([k, v]) => `${k.toUpperCase().replace(/_/g, " ")}\n${v}`).join("\n\n")
        : (plan || "");

      const renderPlan = () => {
        const ordered = [
          ["PRE-LAUNCH CHECKLIST",  "pre_launch",       200],
          ["LAUNCH WEEK TACTICS",   "launch_week",      400],
          ["PRICING STRATEGY",      "pricing_strategy", 600],
          ["REVIEW & ARC STRATEGY", "review_strategy",  800],
          ["SOCIAL MEDIA PLAN",     "social_media",     1000],
          ["ALGORITHM TRIGGERS",    "algorithm_tips",   1200],
          ["EMAIL LIST BUILDING",   "email_list",       1400],
          ["POST-LAUNCH PLAN",      "post_launch",      1600],
          ["BUDGET BREAKDOWN",      "budget_breakdown", 1800],
          ["SUCCESS METRICS",       "kpis",             2000]
        ];
        const items = [];
        let primaryPaywallShown = false;
        for (const [title, key, delay] of ordered) {
          const isFree = FREE_SECTION_KEYS.has(key);
          if (isPro || isFree) {
            if (parsedPlan[key]) items.push({ type: 'section', title, key, delay });
          } else {
            if (!primaryPaywallShown) { items.push({ type: 'paywall_primary', title, key, delay }); primaryPaywallShown = true; }
            else { items.push({ type: 'paywall_slim', title, key, delay }); }
          }
        }
        return items;
      };

      return (
        <div style={{ minHeight: "100vh", background: "#0D0D0F", backgroundImage: "radial-gradient(ellipse at 20% 20%, rgba(232,197,71,0.06) 0%, transparent 60%)", fontFamily: "'Lora', Georgia, serif", padding: "0 16px 60px", display: "flex", flexDirection: "column", alignItems: "center" }}>
          {showVerifyModal && (
            <VerifyModal
              onSuccess={(token, email) => { onProVerified(token, email); setShowVerifyModal(false); }}
              onClose={() => setShowVerifyModal(false)}
            />
          )}
          {showLaunchDateModal && (
            <LaunchDateModal
              onSave={(date) => savePlan(date)}
              onSkip={() => setShowLaunchDateModal(false)}
            />
          )}

          <div className="no-print" style={{ width: "100%", maxWidth: 680, paddingTop: 32, marginBottom: 32, animation: "fadeUp 0.6s ease both", display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16 }}>
            <div>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.3em", textTransform: "uppercase", marginBottom: 12, opacity: 0.8 }}>
                PressReady · Launch Intelligence
                {isPro && <span style={{ marginLeft: 12, color: "rgba(232,197,71,0.8)", fontSize: 9 }}>· PRO</span>}
              </div>
              <h1 style={{ fontSize: "clamp(28px, 5vw, 44px)", fontWeight: 600, color: "#FFFFFF", margin: 0, lineHeight: 1.15, fontFamily: "'Lora', Georgia, serif" }}>
                Press<span style={{ fontStyle: "italic", color: "#E8C547" }}>Ready</span>
              </h1>
            </div>
            {!plan && !parsedPlan && !loading && (
              <button onClick={onBackToLanding} style={{ background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.5)", padding: "8px 16px", borderRadius: 6, fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: "0.12em", cursor: "pointer", textTransform: "uppercase" }}>← Home</button>
            )}
          </div>

          <div style={{ width: "100%", maxWidth: 680, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 16, padding: "36px 32px", animation: "fadeUp 0.7s ease 0.1s both" }}>

            {!plan && !parsedPlan && !loading && (
              <>
                <ProgressBar step={step} />
                {step === 0 && (<div><Label>What genre is your book?</Label><SelectGrid options={GENRES} value={form.genre} onChange={v => { update("genre", v); track('genre_selected', { genre: v }); }} /></div>)}
                {step === 1 && (<div><Label>Book title</Label><Input placeholder="Book title *" value={form.title} onChange={e => update("title", e.target.value)} /><div style={{ marginTop: 24 }}><Label>Where does this book sit?</Label><SelectGrid options={SERIES_POSITIONS} value={form.series_position} onChange={v => update("series_position", v)} minWidth={170} /></div></div>)}
                {step === 2 && (<div><Label>How many books have you published?</Label><SelectGrid options={EXPERIENCE} value={form.experience} onChange={v => update("experience", v)} minWidth={160} /><div style={{ marginTop: 24 }}><Label>Email list size</Label><SelectGrid options={LIST_SIZES} value={form.list_size} onChange={v => update("list_size", v)} minWidth={130} /></div><div style={{ marginTop: 24 }}><Label>Other titles in this pen name</Label><SelectGrid options={CATALOG_SIZES} value={form.catalog_size} onChange={v => update("catalog_size", v)} minWidth={180} /></div></div>)}
                {step === 3 && (<div><Label>Publishing platform</Label><SelectGrid options={PLATFORMS} value={form.platform} onChange={v => update("platform", v)} minWidth={180} /></div>)}
                {step === 4 && (<div><Label>Marketing budget</Label><SelectGrid options={BUDGETS} value={form.budget} onChange={v => update("budget", v)} minWidth={160} /></div>)}
                {step === 5 && (<div><Label>Time until launch</Label><SelectGrid options={TIMELINES} value={form.timeline} onChange={v => update("timeline", v)} /></div>)}

                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 36, alignItems: "center" }}>
                  {step > 0 ? <button onClick={() => setStep(s => s - 1)} style={{ background: "transparent", border: "none", color: "rgba(255,255,255,0.4)", fontFamily: "'Space Mono', monospace", fontSize: 12, cursor: "pointer", letterSpacing: "0.08em" }}>← BACK</button> : <div />}
                  <button onClick={handleNext} disabled={!canNext()} style={{ padding: "14px 32px", borderRadius: 8, background: canNext() ? "#E8C547" : "rgba(255,255,255,0.08)", color: canNext() ? "#0D0D0F" : "rgba(255,255,255,0.25)", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.12em", cursor: canNext() ? "pointer" : "not-allowed", transition: "all 0.2s", textTransform: "uppercase" }}>
                    {step === STEPS.length - 1 ? "Generate Plan →" : "Next →"}
                  </button>
                </div>
              </>
            )}

            {loading && (
              <div style={{ textAlign: "center", padding: "48px 0" }}>
                <div style={{ width: 48, height: 48, borderRadius: "50%", border: "3px solid rgba(232,197,71,0.2)", borderTop: "3px solid #E8C547", margin: "0 auto 24px", animation: "spin 1s linear infinite" }} />
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: "#E8C547", letterSpacing: "0.15em" }}><RotatingMessage /></div>
                <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 13, marginTop: 12, fontStyle: "italic" }}>This usually takes 10–20 seconds. Please wait...</div>
              </div>
            )}

            {error && (
              <div style={{ textAlign: "center", padding: "32px 0" }}>
                <div style={{ color: "#ff6b6b", fontFamily: "'Space Mono', monospace", fontSize: 13, lineHeight: 1.6, maxWidth: 480, margin: "0 auto" }}>{error}</div>
                <button onClick={reset} style={{ marginTop: 20, padding: "10px 24px", borderRadius: 6, background: "transparent", border: "1.5px solid #E8C547", color: "#E8C547", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer" }}>TRY AGAIN</button>
              </div>
            )}

            {(plan || parsedPlan) && !loading && (
              <div className="print-plan" style={{ animation: "fadeUp 0.5s ease both" }}>
                <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 32, flexWrap: "wrap", gap: 12 }}>
                  <div>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 6 }}>
                      LAUNCH PLAN {isPro ? "· PRO" : "PREVIEW"}
                    </div>
                    <h2 style={{ fontFamily: "'Lora', serif", color: "#fff", fontSize: 22, margin: 0, fontWeight: 600 }}>{form.title}</h2>
                    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>{form.genre} · {form.series_position} · {form.platform} · {form.timeline}</div>
                  </div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <CopyButton planText={planText} onCopy={() => track('plan_copied', { genre: form.genre, isPro })} />
                    <ShareButton />
                    {isPro && (
                      <button onClick={() => { track('plan_downloaded', { genre: form.genre }); window.print(); }} style={{ padding: "12px 20px", borderRadius: 6, border: "1.5px solid rgba(255,255,255,0.15)", background: "transparent", color: "rgba(255,255,255,0.6)", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer" }}>SAVE PDF</button>
                    )}
                    {isPro && planSaved && (
                      <button onClick={onDashboard} style={{ padding: "12px 20px", borderRadius: 6, border: "1.5px solid rgba(232,197,71,0.4)", background: "rgba(232,197,71,0.08)", color: "#E8C547", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer" }}>VIEW DASHBOARD →</button>
                    )}
                    {isPro && !planSaved && parsedPlan && (
                      <button onClick={() => setShowLaunchDateModal(true)} style={{ padding: "12px 20px", borderRadius: 6, border: "1.5px solid rgba(232,197,71,0.3)", background: "transparent", color: "rgba(232,197,71,0.6)", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer" }}>SAVE TO DASHBOARD</button>
                    )}
                    <button onClick={reset} style={{ padding: "12px 20px", borderRadius: 6, border: "1.5px solid rgba(255,255,255,0.15)", background: "transparent", color: "rgba(255,255,255,0.5)", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer" }}>NEW PLAN</button>
                  </div>
                </div>

                <div className="no-print" style={{ height: 1, background: "rgba(232,197,71,0.2)", marginBottom: 32 }} />

                {parsedPlan && (
                  <>
                    {parsedPlan.executive_summary && (
                      <div style={{ background: "rgba(232,197,71,0.08)", border: "1px solid rgba(232,197,71,0.2)", borderRadius: 10, padding: "18px 20px", marginBottom: 28 }}>
                        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 8 }}>STRATEGY OVERVIEW</div>
                        <div style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.9)", lineHeight: 1.7, fontStyle: "italic" }}>{parsedPlan.executive_summary}</div>
                      </div>
                    )}

                    {renderPlan().map(item => {
                      if (item.type === 'section') return <PlanSection key={item.key} title={item.title} content={parsedPlan[item.key]} delay={item.delay} />;
                      if (item.type === 'paywall_primary') return <PaywallCard key={item.key} title={item.title} isPrimary={true} delay={item.delay} onRestoreAccess={() => setShowVerifyModal(true)} />;
                      return <PaywallCard key={item.key} title={item.title} isPrimary={false} delay={item.delay} onRestoreAccess={() => setShowVerifyModal(true)} />;
                    })}

                    {isPro && parsedPlan.pro_tip && (
                      <div style={{ background: "rgba(232,197,71,0.06)", border: "1.5px solid rgba(232,197,71,0.35)", borderRadius: 10, padding: "20px 22px", marginTop: 8 }}>
                        <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 10 }}>✦ ELITE INSIDER TIP</div>
                        <div style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.9)", lineHeight: 1.75 }}>{parsedPlan.pro_tip}</div>
                      </div>
                    )}
                  </>
                )}

                {!parsedPlan && plan && (
                  <div style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.85)", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{plan}</div>
                )}

                <div style={{ marginTop: 40, paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.08)", textAlign: "center" }}>
                  <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.25)", letterSpacing: "0.15em" }}>POWERED BY PRESSREADY · LAUNCH INTELLIGENCE</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Error boundary ────────────────────────────────────────────────────────
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, resetKey: 0 }; }
      static getDerivedStateFromError() { return { hasError: true }; }
      handleReset() { this.setState(prev => ({ hasError: false, resetKey: prev.resetKey + 1 })); }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ minHeight: "100vh", background: "#0D0D0F", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" }}>
              <div style={{ textAlign: "center", maxWidth: 480 }}>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 16 }}>PRESSREADY · LAUNCH INTELLIGENCE</div>
                <h2 style={{ fontFamily: "'Lora', serif", color: "#fff", fontSize: 24, marginBottom: 16 }}>Something went wrong.</h2>
                <p style={{ fontFamily: "'Lora', serif", color: "rgba(255,255,255,0.55)", fontSize: 15, lineHeight: 1.7, marginBottom: 28 }}>The plan ran into an unexpected error. Please try generating again.</p>
                <button onClick={() => this.handleReset()} style={{ padding: "12px 28px", borderRadius: 8, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.12em", cursor: "pointer", textTransform: "uppercase" }}>Try Again</button>
              </div>
            </div>
          );
        }
        return <div key={this.state.resetKey}>{this.props.children}</div>;
      }
    }

    // ── Launch Date Modal ─────────────────────────────────────────────────────
    function LaunchDateModal({ onSave, onSkip }) {
      const [date, setDate] = useState('');
      const today = new Date().toISOString().split('T')[0];
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: "16px" }}>
          <div style={{ background: "#141416", border: "1.5px solid rgba(232,197,71,0.3)", borderRadius: 16, padding: "36px 32px", maxWidth: 420, width: "100%", animation: "modalIn 0.25s ease" }}>
            <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 16 }}>SAVE TO DASHBOARD</div>
            <h3 style={{ fontFamily: "'Lora', serif", fontSize: 22, color: "#fff", fontWeight: 600, marginBottom: 10 }}>When is your launch date?</h3>
            <p style={{ fontFamily: "'Lora', serif", fontSize: 14, color: "rgba(255,255,255,0.6)", lineHeight: 1.7, marginBottom: 24 }}>Set a launch date and we'll track your countdown, phase, and daily action items on your dashboard.</p>
            <input type="date" min={today} value={date} onChange={e => setDate(e.target.value)}
              style={{ width: "100%", padding: "13px 16px", background: "rgba(255,255,255,0.06)", border: "1.5px solid rgba(255,255,255,0.15)", borderRadius: 8, color: "#fff", fontFamily: "'Space Mono', monospace", fontSize: 14, marginBottom: 16, colorScheme: "dark" }} />
            <button onClick={() => onSave(date || null)} style={{ width: "100%", padding: "14px", borderRadius: 8, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, letterSpacing: "0.12em", cursor: "pointer", textTransform: "uppercase", marginBottom: 10 }}>
              SAVE TO DASHBOARD →
            </button>
            <button onClick={onSkip} style={{ width: "100%", padding: "10px", borderRadius: 8, background: "transparent", border: "1px solid rgba(255,255,255,0.12)", color: "rgba(255,255,255,0.4)", fontFamily: "'Space Mono', monospace", fontSize: 11, cursor: "pointer" }}>
              SKIP FOR NOW
            </button>
          </div>
        </div>
      );
    }

    // ── Dashboard ─────────────────────────────────────────────────────────────
    function Dashboard({ proState, onNewPlan, onBackToLanding }) {
      const [plans, setPlans] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedPlan, setSelectedPlan] = useState(null);

      useEffect(() => {
        if (!proState.token) { setLoading(false); return; }
        fetch('/api/get-plans', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pro_token: proState.token })
        })
          .then(r => r.json())
          .then(data => { setPlans(data.plans || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      function daysUntilLaunch(launchDate) {
        if (!launchDate) return null;
        const today = new Date(); today.setHours(0,0,0,0);
        const launch = new Date(launchDate); launch.setHours(0,0,0,0);
        return Math.ceil((launch - today) / (1000 * 60 * 60 * 24));
      }

      function getPhase(days) {
        if (days === null) return { label: 'NO DATE SET', color: 'rgba(255,255,255,0.3)' };
        if (days > 14) return { label: 'PRE-LAUNCH', color: '#E8C547' };
        if (days > 0) return { label: 'LAUNCH WEEK', color: '#ff9f43' };
        if (days === 0) return { label: 'LAUNCH DAY', color: '#ee5a24' };
        if (days > -30) return { label: 'POST-LAUNCH', color: '#26de81' };
        return { label: 'COMPLETE', color: 'rgba(255,255,255,0.3)' };
      }

      function getTodayTasks(plan, days) {
        if (!plan || days === null) return ['• Set a launch date to see your daily tasks'];
        const pd = plan.plan_data;
        if (days > 14) {
          return (pd.pre_launch || '').split('\n').filter(l => l.trim().startsWith('•')).slice(0, 3);
        }
        if (days >= 0 && days <= 7) {
          const dayNum = 7 - days + 1;
          const lines = (pd.launch_week || '').split('\n');
          const dayLine = lines.find(l => l.startsWith(`Day ${dayNum}:`));
          return dayLine ? [dayLine] : ['• Execute today\'s launch week tactic'];
        }
        if (days < 0 && days > -30) {
          const phase = Math.abs(days) <= 10 ? 0 : Math.abs(days) <= 20 ? 1 : 2;
          const phases = (pd.post_launch || '').split('\n\n');
          return (phases[phase] || '').split('\n').filter(l => l.trim().startsWith('•')).slice(0, 2);
        }
        return ['• Your launch is complete — plan your next book'];
      }

      if (selectedPlan) {
        const days = daysUntilLaunch(selectedPlan.launch_date);
        const phase = getPhase(days);
        const tasks = getTodayTasks(selectedPlan, days);
        const pd = selectedPlan.plan_data;
        return (
          <div style={{ minHeight: "100vh", background: "#0D0D0F", padding: "0 16px 60px", display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ width: "100%", maxWidth: 680, paddingTop: 32, marginBottom: 24, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
              <div>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.3em", marginBottom: 8 }}>PRESSREADY · PRO · LAUNCH DASHBOARD</div>
                <h1 style={{ fontFamily: "'Lora', serif", fontSize: 28, color: "#fff", fontWeight: 600 }}>{selectedPlan.title}</h1>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>{selectedPlan.genre} · {selectedPlan.platform}</div>
              </div>
              <button onClick={() => setSelectedPlan(null)} style={{ background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.5)", padding: "8px 16px", borderRadius: 6, fontFamily: "'Space Mono', monospace", fontSize: 10, cursor: "pointer" }}>← BACK</button>
            </div>
            <div style={{ width: "100%", maxWidth: 680, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
              <div style={{ background: "rgba(232,197,71,0.08)", border: "1px solid rgba(232,197,71,0.25)", borderRadius: 12, padding: "20px 24px" }}>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 8 }}>DAYS UNTIL LAUNCH</div>
                <div style={{ fontFamily: "'Lora', serif", fontSize: 48, color: "#E8C547", fontWeight: 600, lineHeight: 1 }}>{days === null ? '—' : days === 0 ? 'TODAY' : Math.abs(days)}</div>
                {days !== null && days !== 0 && <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>{days < 0 ? 'DAYS SINCE LAUNCH' : 'DAYS REMAINING'}</div>}
              </div>
              <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "20px 24px" }}>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 8 }}>CURRENT PHASE</div>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 18, color: phase.color, fontWeight: 700 }}>{phase.label}</div>
                {selectedPlan.launch_date && <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.3)", marginTop: 8 }}>LAUNCH: {new Date(selectedPlan.launch_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>}
              </div>
            </div>
            <div style={{ width: "100%", maxWidth: 680, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "24px", marginBottom: 20 }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 16 }}>TODAY'S FOCUS</div>
              {tasks.map((t, i) => <div key={i} style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.85)", lineHeight: 1.7, marginBottom: 8 }}>{t}</div>)}
            </div>
            {[["STRATEGY OVERVIEW",pd.executive_summary],["PRE-LAUNCH CHECKLIST",pd.pre_launch],["LAUNCH WEEK TACTICS",pd.launch_week],["PRICING STRATEGY",pd.pricing_strategy],["REVIEW & ARC STRATEGY",pd.review_strategy],["SOCIAL MEDIA PLAN",pd.social_media],["ALGORITHM TRIGGERS",pd.algorithm_tips],["EMAIL LIST BUILDING",pd.email_list],["POST-LAUNCH PLAN",pd.post_launch],["BUDGET BREAKDOWN",pd.budget_breakdown],["SUCCESS METRICS",pd.kpis]].filter(([,v])=>v).map(([title,content])=>(
              <div key={title} style={{ width: "100%", maxWidth: 680, marginBottom: 20, borderLeft: "3px solid #E8C547", paddingLeft: 18 }}>
                <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 10 }}>{title}</div>
                <div style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.85)", lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{content}</div>
              </div>
            ))}
            {pd.pro_tip && <div style={{ width: "100%", maxWidth: 680, background: "rgba(232,197,71,0.06)", border: "1.5px solid rgba(232,197,71,0.35)", borderRadius: 10, padding: "20px 22px" }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.15em", marginBottom: 10 }}>✦ ELITE INSIDER TIP</div>
              <div style={{ fontFamily: "'Lora', serif", fontSize: 15, color: "rgba(255,255,255,0.9)", lineHeight: 1.75 }}>{pd.pro_tip}</div>
            </div>}
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", background: "#0D0D0F", padding: "0 16px 60px", display: "flex", flexDirection: "column", alignItems: "center" }}>
          <div style={{ width: "100%", maxWidth: 680, paddingTop: 32, marginBottom: 32, display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 16 }}>
            <div>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.3em", marginBottom: 8 }}>PRESSREADY · PRO</div>
              <h1 style={{ fontFamily: "'Lora', serif", fontSize: 32, color: "#fff", fontWeight: 600 }}>Launch Dashboard</h1>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={onNewPlan} style={{ padding: "10px 20px", borderRadius: 8, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", cursor: "pointer" }}>+ NEW PLAN</button>
              <button onClick={onBackToLanding} style={{ background: "transparent", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.5)", padding: "10px 16px", borderRadius: 8, fontFamily: "'Space Mono', monospace", fontSize: 10, cursor: "pointer" }}>← HOME</button>
            </div>
          </div>
          {loading && <div style={{ color: "rgba(255,255,255,0.4)", fontFamily: "'Space Mono', monospace", fontSize: 12, marginTop: 60 }}>LOADING YOUR LAUNCHES...</div>}
          {!loading && plans.length === 0 && (
            <div style={{ width: "100%", maxWidth: 680, textAlign: "center", padding: "60px 24px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 14 }}>
              <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "#E8C547", letterSpacing: "0.2em", marginBottom: 16 }}>NO LAUNCHES YET</div>
              <h3 style={{ fontFamily: "'Lora', serif", fontSize: 22, color: "#fff", marginBottom: 12, fontWeight: 600 }}>Generate your first plan to get started.</h3>
              <p style={{ fontFamily: "'Lora', serif", fontSize: 14, color: "rgba(255,255,255,0.5)", lineHeight: 1.7, marginBottom: 28 }}>Your saved launch plans will appear here with countdown timers, phase tracking, and today's action items.</p>
              <button onClick={onNewPlan} style={{ padding: "14px 32px", borderRadius: 8, background: "#E8C547", color: "#0D0D0F", border: "none", fontFamily: "'Space Mono', monospace", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: "0.12em" }}>GENERATE YOUR FIRST PLAN →</button>
            </div>
          )}
          {!loading && plans.length > 0 && (
            <div style={{ width: "100%", maxWidth: 680, display: "flex", flexDirection: "column", gap: 16 }}>
              {plans.map(plan => {
                const days = daysUntilLaunch(plan.launch_date);
                const phase = getPhase(days);
                return (
                  <div key={plan.id} onClick={() => setSelectedPlan(plan)}
                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(232,197,71,0.3)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor='rgba(255,255,255,0.08)'}
                    style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 12, padding: "24px 28px", cursor: "pointer", transition: "border-color 0.2s", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                    <div>
                      <h3 style={{ fontFamily: "'Lora', serif", fontSize: 20, color: "#fff", fontWeight: 600, marginBottom: 4 }}>{plan.title}</h3>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: "rgba(255,255,255,0.4)", letterSpacing: "0.08em" }}>{plan.genre} · {plan.platform}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: phase.color, fontWeight: 700, letterSpacing: "0.08em", marginBottom: 4 }}>{phase.label}</div>
                      <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 11, color: "rgba(255,255,255,0.35)" }}>
                        {days === null ? 'No launch date set' : days === 0 ? 'TODAY' : days > 0 ? `${days} days until launch` : `${Math.abs(days)} days post-launch`}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ── App root ──────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState('landing');
      const [proState, setProState] = useState(() => readProState());

      const handleProVerified = (token, email) => {
        setProState({ token, email, legacy: false, isPro: true });
      };

      return view === 'landing'
        ? <Landing onStart={() => setView('wizard')} onDashboard={() => setView('dashboard')} proState={proState} />
        : view === 'dashboard'
        ? <Dashboard proState={proState} onNewPlan={() => setView('wizard')} onBackToLanding={() => setView('landing')} />
        : <Wizard onBackToLanding={() => setView('landing')} onDashboard={() => setView('dashboard')} proState={proState} onProVerified={handleProVerified} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
